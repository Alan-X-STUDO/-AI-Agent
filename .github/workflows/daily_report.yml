name: Daily DingTalk Report

on:
  schedule:
    # 北京时间 22:00 = UTC 时间 14:00
    - cron: '0 14 * * *'
  workflow_dispatch: # 保留这个，方便你随时手动点击按钮测试

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          WEATHER_KEY: ${{ secrets.WEATHER_KEY }}
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
        run: python main.py
